<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>亚马逊FBA选品池 - Element Plus</title>
  <!-- 引入 Element Plus CSS -->
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
  <!-- 引入 Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- 引入 Element Plus JS -->
  <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
  <script src="https://unpkg.com/element-plus/dist/locale/zh-cn.js"></script>
  <!-- 引入 Icons -->
  <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f2f5;
      font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
      font-size: 14px;
      color: #333;
    }
    #app {
      padding: 15px;
    }
    
    /* 顶部标题区 */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background-color: #fff;
      border-radius: 4px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,21,41,.08);
    }
    .page-header .title {
      font-size: 16px;
      font-weight: bold;
      color: #303133;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-header .title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      background-color: #409eff;
      border-radius: 2px;
    }

    /* Tab 页签样式 */
    .custom-tabs {
      background-color: #fff;
      padding: 10px 20px 0;
      border-radius: 4px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,21,41,.08);
    }
    .custom-tabs .el-tabs__header {
      margin: 0;
    }
    .custom-tabs .el-tabs__nav-wrap::after {
      height: 1px;
    }


    /* 筛选区域 */
    .filter-box {
      background-color: #fff;
      padding: 15px 20px;
      border-radius: 4px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,21,41,.08);
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    .filter-row:last-child {
      margin-bottom: 0;
    }
    .filter-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .filter-label {
      color: #606266;
      font-size: 14px;
      white-space: nowrap;
    }

    /* 数据表格区域 */
    .table-container {
      background-color: #fff;
      padding: 15px 20px;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,21,41,.08);
    }
    
    .el-table {
      font-size: 14px;
      --el-table-border-color: #ebeef5;
      --el-table-header-bg-color: #f5f7fa;
    }
    .el-table .el-table__cell {
      vertical-align: top !important;
    }
    .el-table .middle-align-col {
      vertical-align: middle !important;
    }
    .el-table th.el-table__cell {
      text-align: left !important;
    }
    .el-table .cell {
      line-height: 1.6;
      padding: 8px 12px;
    }
    
    /* 左侧图片区域样式 (完全还原截图风格) */
    .img-col-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-top-text {
      color: #606266;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .product-img {
      width: 90px;
      height: 90px;
      border: 1px solid #ebeef5;
      border-radius: 4px;
      padding: 2px;
      margin-bottom: 6px;
    }
    .status-tags {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 80px;
    }
    .status-tag-orange {
      background-color: #f59a23;
      color: #fff;
      border-radius: 2px;
      padding: 2px 0;
      font-size: 12px;
    }
    .status-tag-green {
      background-color: #67c23a;
      color: #fff;
      border-radius: 2px;
      padding: 2px 0;
      font-size: 12px;
    }
    .status-tag-text {
      color: #606266;
      font-size: 12px;
      margin-top: 2px;
    }

    /* 中间产品信息样式 */
    .product-title-en {
      color: #303133;
      font-size: 14px;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .product-title-zh {
      color: #303133;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .info-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .info-item {
      display: flex;
      align-items: flex-start;
      color: #606266;
      white-space: nowrap;
    }
    .info-label {
      color: #909399;
      margin-right: 4px;
    }
    .info-value {
      color: #303133;
    }
    .text-blue {
      color: #409eff;
      font-weight: bold;
      cursor: pointer;
    }
    .edit-icon {
      color: #409eff;
      margin-left: 4px;
      cursor: pointer;
    }

    /* 右侧店铺/人员样式 */
    .store-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #303133;
      margin-bottom: 8px;
    }
    .flag-icon {
      width: 20px;
      height: 14px;
      background: url('https://upload.wikimedia.org/wikipedia/en/a/a4/Flag_of_the_United_States.svg') no-resize center/cover;
      display: inline-block;
      border: 1px solid #eee;
    }

    /* 店铺选择器自定义样式 (兼容最新 Element Plus) */
    .custom-store-select {
      display: flex;
      width: 220px;
      height: 32px;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      background-color: #fff;
      transition: border-color 0.2s cubic-bezier(0.645, 0.045, 0.355, 1);
      overflow: hidden;
    }
    .custom-store-select:hover {
      border-color: #c0c4cc;
    }
    .custom-store-select:focus-within {
      border-color: #409eff;
    }
    .borderless-select {
      flex: 1;
      width: 100%;
    }
    .borderless-select .el-input__wrapper,
    .borderless-select .el-select__wrapper,
    .borderless-select .el-select__wrapper.is-focus,
    .borderless-select .el-input__wrapper.is-focus {
      box-shadow: none !important;
      background-color: transparent !important;
      padding-right: 8px;
    }
    .custom-store-append {
      width: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f7fa;
      border-left: 1px solid #dcdfe6;
      color: #909399;
      cursor: pointer;
      flex-shrink: 0;
    }
    .custom-store-append:hover {
      color: #409eff;
    }

    /* 复合输入框样式 */
    .composite-input {
      --el-input-border-color: #dcdfe6;
    }
    .composite-input .el-input-group__prepend {
      background-color: #fff;
      padding: 0;
    }
    .composite-input .el-input-group__prepend .el-select {
      margin: 0;
    }
    .composite-input .el-input-group__prepend .el-input__wrapper {
      box-shadow: none !important;
      background-color: transparent;
    }
    .composite-input .el-input-group__prepend .el-input__inner {
      text-align: center;
      color: #606266;
    }
    .composite-input .el-input-group__append {
      background-color: #f5f7fa;
      color: #909399;
      padding: 0;
      width: 32px;
      text-align: center;
      cursor: pointer;
    }
    .composite-input .el-input-group__append:hover {
      color: #409eff;
    }

    /* 操作日志弹窗样式 */
    .log-dialog .el-dialog__header {
      margin-right: 0;
      padding: 15px 20px;
      border-bottom: 1px solid #ebeef5;
    }
    .log-dialog .el-dialog__title {
      font-size: 16px;
      color: #303133;
      font-weight: normal;
    }
    .log-dialog .el-dialog__headerbtn {
      top: 15px;
      right: 20px;
    }
    .log-dialog .el-dialog__body {
      padding: 20px;
    }

  </style>
</head>
<body>
  <div id="app">
    <!-- 头部 -->
    <div class="page-header">
      <div class="title">亚马逊FBA选品池</div>
    </div>

    <!-- Tab 页签 -->
    <div class="custom-tabs">
      <el-tabs v-model="activeTab" @tab-click="handleTabClick">
        <el-tab-pane label="FBM机会产品" name="fbm"></el-tab-pane>
        <el-tab-pane label="SKU机会产品" name="sku"></el-tab-pane>
      </el-tabs>
    </div>

    <!-- FBM 视图 -->
    <div v-show="activeTab === 'fbm'">
      <!-- 搜索筛选区 -->
      <div class="filter-box">
      <div class="filter-row">
        <div class="filter-item">
          <el-input v-model="filters.searchValue" placeholder="请输入" clearable style="width: 250px;" class="composite-input">
            <template #prepend>
              <el-select v-model="filters.searchType" style="width: 85px;">
                <el-option label="ASIN" value="asin"></el-option>
                <el-option label="SKU" value="sku"></el-option>
                <el-option label="MSKU" value="msku"></el-option>
              </el-select>
            </template>
            <template #append>
              <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 1024 1024" width="15" height="15"><path fill="currentColor" d="M128 256h768v85.333H128zM128 469.333h768v85.333H128zM128 682.667h768v85.333H128z"></path></svg>
              </div>
            </template>
          </el-input>
        </div>
        <div class="filter-item">
          <div class="custom-store-select">
            <el-select v-model="filters.store" placeholder="全部店铺" clearable class="borderless-select">
              <el-option label="Amazon-Z01008-US" value="Z01008"></el-option>
            </el-select>
            <div class="custom-store-append">
              <svg viewBox="0 0 1024 1024" width="15" height="15"><path fill="currentColor" d="M128 256h768v85.333H128zM128 469.333h768v85.333H128zM128 682.667h768v85.333H128z"></path></svg>
            </div>
          </div>
        </div>
        <div class="filter-item">
          <span class="filter-label">审核状态</span>
          <el-select v-model="filters.status" placeholder="请选择状态" clearable style="width: 120px;">
            <el-option label="待审核" value="pending"></el-option>
            <el-option label="审核通过" value="approved"></el-option>
            <el-option label="不转FBA" value="rejected"></el-option>
          </el-select>
        </div>
        <div class="filter-item">
          <span class="filter-label">推荐类型</span>
          <el-select v-model="filters.recommendationType" placeholder="请选择类型" multiple collapse-tags clearable style="width: 180px;">
            <el-option label="亚马逊机会产品" value="amazon_opportunity"></el-option>
            <el-option label="多平台机会产品" value="multiplatform_opportunity"></el-option>
          </el-select>
        </div>
        <div class="filter-item">
          <el-button type="primary" icon="Search">查询</el-button>
          <el-button icon="RefreshRight">重置</el-button>
        </div>
      </div>
    </div>

    <!-- 数据表格 -->
    <div class="table-container">
      <div style="margin-bottom: 10px;">
        <el-button type="primary" @click="showBatchAuditDialog">批量审核</el-button>
      </div>
      <el-table :data="tableData" border style="width: 100%" @selection-change="handleSelectionChange">
        <!-- 勾选列 -->
        <el-table-column type="selection" width="45" align="center"></el-table-column>
        
        <!-- 合并后的产品信息列 -->
        <el-table-column label="产品信息" min-width="480">
          <template #header>
            <div style="display: flex; align-items: center; gap: 4px;">
              产品信息
            </div>
          </template>
          <template #default="scope">
            <div style="display: flex; gap: 15px;">
              <!-- 左侧图片/状态 -->
              <div class="img-col-container" style="flex-shrink: 0; width: 110px;">
                <div class="img-top-text">{{ scope.row.listingType }}</div>
                <img :src="scope.row.image" class="product-img" alt="产品图片" />
                <el-tag v-if="scope.row.opportunityTag" type="success" size="small" style="margin-top: 4px; white-space: normal; height: auto; padding: 2px 4px; line-height: 1.2;">{{ scope.row.opportunityTag }}</el-tag>
              </div>
              
              <!-- 右侧核心信息 -->
              <div style="flex: 1; min-width: 0;">
                <div class="product-title-en">
                  {{ scope.row.titleEn }} <el-icon class="edit-icon"><EditPen /></el-icon>
                </div>
                <div class="product-title-zh">
                  {{ scope.row.titleZh }}
                </div>
                <div class="info-list">
                  <div class="info-item">
                    <span class="info-label">系统SKU:</span>
                    <span class="info-value">{{ scope.row.sku }}</span>
                    <el-icon class="edit-icon"><EditPen /></el-icon>
                  </div>
                  <div class="info-item">
                    <span class="info-label">MSKU:</span>
                    <span class="info-value">{{ scope.row.msku }}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">ASIN:</span>
                    <span class="text-blue">{{ scope.row.asin }}</span>
                    <el-icon class="edit-icon" style="margin-left: 8px; font-size: 14px;"><DocumentCopy /></el-icon>
                  </div>
                  <div class="info-item">
                    <span class="info-label">品牌:</span>
                    <span class="info-value">{{ scope.row.brand }}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">FBA业务员:</span>
                    <span class="info-value">{{ scope.row.fbaSalesman }}</span>
                  </div>
                  <div class="info-item">
                    <span class="info-label">FBA销售小组:</span>
                    <span class="info-value">{{ scope.row.group }}</span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </el-table-column>

        <!-- 产品属性列 -->
        <el-table-column label="产品属性" min-width="220">
          <template #header>
            <div style="display: flex; align-items: center; gap: 4px;">
              产品属性
            </div>
          </template>
          <template #default="scope">
            <div class="info-list" style="gap: 5px;">
              <div class="info-item">
                <span class="info-label">物流属性:</span>
                <span class="info-value">{{ scope.row.logisticsAttr }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">单个产品尺寸:</span>
                <span class="info-value">{{ scope.row.productSize }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">毛重:</span>
                <span class="info-value">{{ scope.row.grossWeight }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">体积重:</span>
                <span class="info-value">{{ scope.row.volumeWeight }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">抛率:</span>
                <span class="info-value">{{ scope.row.throwRate }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">产品标签:</span>
                <span class="info-value">{{ scope.row.productTag }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">节日标签:</span>
                <span class="info-value">{{ scope.row.holidayTag }}</span>
              </div>
            </div>
          </template>
        </el-table-column>

        <!-- LISTING信息列 -->
        <el-table-column label="LISTING信息" min-width="280">
          <template #header>
            <div style="display: flex; align-items: center; gap: 4px;">
              LISTING信息
            </div>
          </template>
          <template #default="scope">
            <div class="info-list" style="gap: 5px;">
              <div class="info-item">
                <span class="info-label">来源渠道:</span>
                <span class="info-value">{{ scope.row.sourceChannel }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">店铺状态:</span>
                <span style="color: #67c23a;">{{ scope.row.storeStatus }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">开启备货:</span>
                <span class="info-value">
                  <svg v-if="scope.row.isStockEnabled" viewBox="0 0 1024 1024" width="24" height="24" style="vertical-align: middle;"><path fill="#409eff" d="M512 896C299.92 896 128 724.08 128 512S299.92 128 512 128s384 171.92 384 384-171.92 384-384 384z"></path><path fill="#ffffff" d="M455.2 697.6c-13.68 0-26.64-5.36-36.48-15.04l-143.2-140.8c-20.24-19.84-20.48-52.24-.64-72.48s52.24-20.48 72.48-.64l106.8 105.04 221.76-231.28c19.44-20.32 51.76-21.04 72.08-1.52 20.32 19.36 21.04 51.68 1.52 72L492.8 681.36c-9.68 10.16-23.04 16.24-37.6 16.24z"></path></svg>
                  <svg v-else viewBox="0 0 1024 1024" width="24" height="24" style="vertical-align: middle;"><path fill="#f56c6c" d="M512 896C299.92 896 128 724.08 128 512S299.92 128 512 128s384 171.92 384 384-171.92 384-384 384z"></path><path fill="#ffffff" d="M685.2 338.8c18.72 18.72 18.72 49.12 0 67.84L579.84 512l105.36 105.36c18.72 18.72 18.72 49.12 0 67.84-18.72 18.72-49.12 18.72-67.84 0L512 579.84 406.64 685.2c-18.72 18.72-49.12 18.72-67.84 0-18.72-18.72-18.72-49.12 0-67.84L444.16 512 338.8 406.64c-18.72-18.72-18.72-49.12 0-67.84 18.72-18.72 49.12-18.72 67.84 0L512 444.16l105.36-105.36c18.72-18.72 49.12-18.72 67.84 0z"></path></svg>
                </span>
              </div>
              <div class="info-item">
                <span class="info-label">星级:</span>
                <span class="info-value">{{ scope.row.starRating }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">评论数:</span>
                <span class="info-value">{{ scope.row.reviewCount }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">当前售价:</span>
                <span class="info-value">{{ scope.row.currentPrice }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">您的价格:</span>
                <span class="info-value">{{ scope.row.yourPrice }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">转FBA预估价格:</span>
                <span class="info-value">{{ scope.row.fbaEstimatedPrice }}</span>
              </div>
            </div>
          </template>
        </el-table-column>

        <!-- 销量列 -->
        <el-table-column label="销量" min-width="260" header-align="left">
          <template #header>
            <div style="display: flex; align-items: center; gap: 4px;">
              销量
            </div>
          </template>
          <template #default="scope">
            <div style="display: flex; flex-direction: column; gap: 12px;">
              <div style="display: flex; justify-content: flex-start; gap: 40px; padding-left: 10px;">
                <!-- 左侧亚马逊合计销量 -->
                <div style="display: flex; flex-direction: column; align-items: flex-start;">
                  <div style="color: #909399; margin-bottom: 8px; font-size: 14px;">亚马逊合计</div>
                  <div style="display: grid; grid-template-columns: auto auto; gap: 6px 8px; align-items: center;">
                    <span style="color: #606266; text-align: left;">7天:</span>
                    <span :style="{ color: scope.row.amazonSales7d.color, fontWeight: 'bold', fontSize: '14px', textAlign: 'left' }">{{ scope.row.amazonSales7d.value }}</span>
                    <span style="color: #606266; text-align: left;">14天:</span>
                    <span :style="{ color: scope.row.amazonSales14d.color, fontWeight: 'bold', fontSize: '14px', textAlign: 'left' }">{{ scope.row.amazonSales14d.value }}</span>
                    <span style="color: #606266; text-align: left;">30天:</span>
                    <span :style="{ color: scope.row.amazonSales30d.color, fontWeight: 'bold', fontSize: '14px', textAlign: 'left' }">{{ scope.row.amazonSales30d.value }}</span>
                  </div>
                </div>
                <!-- 右侧多平台合计销量 -->
                <div style="display: flex; flex-direction: column; align-items: flex-start;">
                  <div style="color: #909399; margin-bottom: 8px; font-size: 14px;">多平台合计</div>
                  <div style="display: grid; grid-template-columns: auto auto; gap: 6px 8px; align-items: center;">
                    <span style="color: #606266; text-align: left;">7天:</span>
                    <span :style="{ color: scope.row.multiPlatformSales7d.color, fontWeight: 'bold', fontSize: '14px', textAlign: 'left' }">{{ scope.row.multiPlatformSales7d.value }}</span>
                    <span style="color: #606266; text-align: left;">14天:</span>
                    <span :style="{ color: scope.row.multiPlatformSales14d.color, fontWeight: 'bold', fontSize: '14px', textAlign: 'left' }">{{ scope.row.multiPlatformSales14d.value }}</span>
                    <span style="color: #606266; text-align: left;">30天:</span>
                    <span :style="{ color: scope.row.multiPlatformSales30d.color, fontWeight: 'bold', fontSize: '14px', textAlign: 'left' }">{{ scope.row.multiPlatformSales30d.value }}</span>
                  </div>
                </div>
              </div>
              <div style="display: flex; flex-direction: column; gap: 6px; padding-left: 10px;">
                <div class="info-item">
                  <span class="info-label">SKU近90天退款率:</span>
                  <span class="info-value">{{ scope.row.skuRefundRate90d }}</span>
                </div>
                <div class="info-item">
                  <span class="info-label">SKU平均星级:</span>
                  <span class="info-value">{{ scope.row.skuCompositeStarRating }}</span>
                </div>
              </div>
            </div>
          </template>
        </el-table-column>

        <!-- 转FBA信息列 -->
